<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截圖工具箱</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>截圖工具箱</h1>
      <p class="desc">左右並排的截圖可以轉成上下排列；單一頁面內容太小看不清楚，可以框選裁切放大。</p>
      <p class="privacy">圖片只會在你的瀏覽器中處理,不會上傳。</p>
    </header>

    <main>
      <section class="upload-section">
        <label for="fileInput" class="upload-box" id="uploadBox">
          <span class="upload-icon">📁</span>
          <span class="upload-text">點擊選擇圖片</span>
          <span class="upload-hint">支援 PNG、JPG、JPEG、WebP</span>
        </label>
        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp" hidden>
      </section>

      <div id="errorMsg" class="error-msg" hidden></div>

      <nav class="mode-tabs" id="modeTabs" hidden>
        <button type="button" class="mode-tab active" data-mode="split">左右轉上下</button>
        <button type="button" class="mode-tab" data-mode="crop">框選裁切放大</button>
      </nav>

      <section class="original-section" id="originalSection" hidden>
        <h2>原始圖片</h2>
        <p class="crop-hint" id="cropHint" hidden>先點選下方常用範圍快速框選，再拖曳藍色圓點微調邊界；也可以直接在圖片上拖曳自由框選。</p>
        <div class="crop-presets" id="cropPresets" hidden>
          <button type="button" class="preset-btn" data-preset="top-half">上半部</button>
          <button type="button" class="preset-btn" data-preset="middle-half">中間</button>
          <button type="button" class="preset-btn" data-preset="bottom-half">下半部</button>
          <button type="button" class="preset-btn" data-preset="top-third">上 1/3</button>
          <button type="button" class="preset-btn" data-preset="middle-third">中 1/3</button>
          <button type="button" class="preset-btn" data-preset="bottom-third">下 1/3</button>
          <button type="button" class="preset-btn clear-btn" id="clearSelectionBtn">清除選取</button>
        </div>
        <div class="preview-frame crop-frame" id="cropFrame">
          <img id="originalPreview" alt="原始圖片預覽">
          <div class="selection-box" id="selectionBox" hidden>
            <span class="handle handle-nw" data-handle="nw"></span>
            <span class="handle handle-ne" data-handle="ne"></span>
            <span class="handle handle-sw" data-handle="sw"></span>
            <span class="handle handle-se" data-handle="se"></span>
          </div>
        </div>
      </section>

      <section class="preview-section mode-panel" id="splitPanel" hidden>
        <div class="preview-box">
          <h2>處理後圖片(上下排列)</h2>
          <div class="preview-frame">
            <canvas id="resultCanvas"></canvas>
          </div>
        </div>
      </section>

      <section class="action-section mode-panel" id="splitAction" hidden>
        <button id="downloadBtn" disabled>下載處理後圖片</button>
      </section>

      <section class="preview-section mode-panel" id="cropPanel" hidden>
        <div class="preview-box">
          <h2>裁切放大結果</h2>
          <div class="preview-frame">
            <canvas id="cropResultCanvas"></canvas>
          </div>
        </div>
      </section>

      <section class="action-section mode-panel" id="cropAction" hidden>
        <button id="cropBtn" disabled>裁切並放大選取區域</button>
        <button id="cropDownloadBtn" disabled>下載裁切結果</button>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
